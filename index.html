<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Růžová stránka s koníky</title>
    <style>
        body {
            background-color: #ffb6c1; 
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .obsah {
            text-align: center;
            color: #d81b60;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        h1 { font-size: 2.5rem; margin-top: 0; }

        /* --- STYL TLAČÍTKA --- */
        .tlacitko {
            background-color: #ff1493;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: 'Comic Sans MS', cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c71585;
            transition: all 0.2s;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }

        .tlacitko:hover {
            background-color: #ff69b4;
            transform: scale(1.1);
        }

        .tlacitko:active {
            transform: translateY(4px);
            box-shadow: 0 0 0;
        }

        /* --- KONÍCI --- */
        .kun {
            position: absolute;
            font-size: 40px;
            bottom: -60px;
            z-index: 1;
        }

        @keyframes beh {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }

        .kun:nth-child(1) { left: 5%;  animation: beh 8s infinite; animation-delay: 0s; }
        .kun:nth-child(2) { left: 20%; animation: beh 10s infinite; animation-delay: 2s; }
        .kun:nth-child(3) { left: 40%; animation: beh 7s infinite; animation-delay: 5s; }
        .kun:nth-child(4) { left: 60%; animation: beh 12s infinite; animation-delay: 1s; }
        .kun:nth-child(5) { left: 80%; animation: beh 9s infinite; animation-delay: 3s; }
    </style>
</head>
<body>

    <!-- Koníci -->
    <div class="kun">🐎</div>
    <div class="kun">🐎</div>
    <div class="kun">🐎</div>
    <div class="kun">🐎</div>
    <div class="kun">🐎</div>

    <!-- Obsah -->
    <div class="obsah">
        <h1>Štancová Natálie</h1>
        <p>Ahoj, jmenuji se Naty a mám ráda koně.</p>
        
        <!-- Původní tlačítko -->
        <a href="2index.html" class="tlacitko">íhaha</a>

        <br><br>

        <!-- NOVÉ tlačítko -->
        <a href="Křivoklát.pdf" class="tlacitko">🏰 moje oblíbené místo</a>
    </div>

</body>
</html>
